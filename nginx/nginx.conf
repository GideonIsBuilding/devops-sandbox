worker_processes auto;
error_log /var/log/nginx/error.log warn;
pid       /var/run/nginx.pid;

events {
    worker_connections 1024;
    use epoll;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    log_format  main  '$remote_addr - $remote_user [$time_local] "$request" '
                      '$status $body_bytes_sent "$http_referer" '
                      '"$http_user_agent" env="$upstream_addr"';

    access_log  /var/log/nginx/access.log  main;

    sendfile       on;
    tcp_nopush     on;
    keepalive_timeout 65;
    gzip           on;

    # DNS resolver — needed for dynamic upstream resolution inside Docker
    resolver 127.0.0.11 valid=5s ipv6=off;

    server {
        listen 80;
        server_name _;

        # ── Platform status page ─────────────────────────────────────────────
        location = / {
            default_type text/html;
            return 200 '<html><body>
<h2>DevOps Sandbox Platform</h2>
<p>API: <a href="/api/">/api/</a></p>
<p>Environments are routed at <code>/envs/{env_id}/</code></p>
</body></html>';
        }

        # ── API proxy ────────────────────────────────────────────────────────
        location /api/ {
            proxy_pass         http://sandbox-api:5000/;
            proxy_set_header   Host            $host;
            proxy_set_header   X-Real-IP       $remote_addr;
            proxy_read_timeout 60s;
        }

        # ── Per-environment routes (auto-generated) ──────────────────────────
        # Each env gets its own conf.d/<env_id>.conf with a location block.
        include /etc/nginx/conf.d/*.conf;

        # ── Catch-all 404 ────────────────────────────────────────────────────
        location / {
            return 404 '{"error":"Not found","hint":"Check /api/envs for active environments"}';
            default_type application/json;
        }
    }
}
