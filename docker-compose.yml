version: "3.9"

# ── DevOps Sandbox Platform — Infrastructure Services ─────────────────────────
# Manages: Nginx reverse proxy + Control API
# Env containers are launched by platform/create_env.sh (not by compose)

services:

  # ── Nginx: front door for all environments ──────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: sandbox-nginx
    restart: unless-stopped
    ports:
      - "${NGINX_PORT:-80}:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d:/etc/nginx/conf.d          # writable — scripts update this
      - nginx_logs:/var/log/nginx
    networks:
      - sandbox-platform
    healthcheck:
      test: ["CMD", "nginx", "-t"]
      interval: 30s
      timeout: 5s
      retries: 3
    labels:
      sandbox.managed: "false"
      sandbox.role: "nginx"

  # ── Control API ──────────────────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: platform/Dockerfile
    container_name: sandbox-api
    restart: unless-stopped
    working_dir: /app
    command: ["python", "platform/api.py"]
    ports:
      - "${API_PORT:-5000}:5000"
    volumes:
      - .:/app                                      # mount entire repo
      - /var/run/docker.sock:/var/run/docker.sock   # Docker socket for script calls
    environment:
      - API_PORT=${API_PORT:-5000}
      - NGINX_CONTAINER=sandbox-nginx
      - PLATFORM_NETWORK=sandbox-platform
      - DEMO_IMAGE=sandbox-demo-app
      - SANDBOX_DEFAULT_TTL=${SANDBOX_DEFAULT_TTL:-1800}
    networks:
      - sandbox-platform
    depends_on:
      - nginx
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/')"]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 20s
    labels:
      sandbox.managed: "false"
      sandbox.role: "api"

volumes:
  nginx_logs:

networks:
  sandbox-platform:
    name: sandbox-platform
    driver: bridge
